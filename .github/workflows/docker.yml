name: Build and Push Multi-Arch Docker Image

on:
  # 1. Manual trigger
  workflow_dispatch: 
    inputs:
      tag:
        description: 'AdGuard Home version tag (e.g., v0.107.73)'
        required: true
        default: 'v0.107.73'

  # 2. External API trigger
  repository_dispatch:
    types: [new_adguardhome_release]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # CORRECTION: docker/ au lieu de actions/
      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      # CORRECTION: docker/ au lieu de actions/
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      # Build and push the multi-arch image
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        
        env:
          TAG_VALUE: ${{ github.event.client_payload.tag_name || github.event.inputs.tag || 'v0.107.73' }}
        
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
          build-args: |
            AGH_VERSION=${{ env.TAG_VALUE }}
            
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/adguardhome-unbound-garnet:${{ env.TAG_VALUE }}
            ${{ secrets.DOCKERHUB_USERNAME }}/adguardhome-unbound-garnet:latest
