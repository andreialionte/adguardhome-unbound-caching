################################## NETWORK #####################################

# Listening address and port
bind 127.0.0.1
port 6379
protected-mode yes
tcp-backlog 65535
timeout 0
tcp-keepalive 300

################################# GENERAL #####################################

# Managed by Docker entrypoint (set to no for foreground execution)
loglevel notice
databases 1

################################ PERSISTENCE ##################################

# Data directory for checkpoints
dir /config/garnet/data

################################## MEMORY #####################################

# RAM Cache optimization (128MB) - Amount of memory to use
# Garnet uses this as a baseline for its main store
maxmemory 128mb

############################### PERFORMANCE ###################################

# Latency monitoring
latency-monitor-threshold 0

# Keyspace notifications (optional)
# notify-keyspace-events ""

############################### REVIVIFICATION ################################

# Enable revivification (automatic recovery and reuse of freed memory)
# This is an optimization specific to Garnet
# By default uses power-of-2 sized bins
# Configuration options (commented for reference):
# - reviv: Enable with default power-of-2 bins
# - reviv-fraction: Fraction of mutable space eligible for revivification (0-1)
# - reviv-search-next-higher-bins: Search this many next-higher bins if best fit fails
# - reviv-bin-best-fit-scan-limit: Number of records to scan for best fit

############################### TIERING & STORAGE ##############################

# Optional: Enable storage tier for larger-than-memory datasets
# storage-tier: no  # Change to yes to enable hybrid log + disk persistence
# logdir: /config/garnet/data  # Directory for tiered records

############################### INDEX SIZING ###################################

# Optional index size tuning (Garnet specific):
# Default: auto-computed based on maxmemory
# For DNS caching use case, typically:
#   - Index size: 16MB (for ~1M cache entries)
#   - Max index: 64MB (allows growth)
# These are passed via command line args in entrypoint.sh
